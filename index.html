<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #0f1117; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; }
header { padding: 12px 20px; background: #0f1117; border-bottom: 1px solid #1e2230; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
.header-left h1 { font-size: 16px; font-weight: 600; color: #fff; }
.header-left p { font-size: 12px; color: #6b7280; margin-top: 2px; }
.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #2d3748; font-size: 12px; font-weight: 500; cursor: pointer; background: #1a1f2e; color: #9ca3af; transition: all .2s; }
.filter-btn.active-all { color: #fff; border-color: #fff; }
.filter-btn.active-book { color: #60a5fa; border-color: #60a5fa; }
.filter-btn.active-cafe { color: #fbbf24; border-color: #fbbf24; }
.filter-btn.active-lib { color: #4ade80; border-color: #4ade80; }
#map { flex: 1; }
.stats-bar { padding: 8px 20px; background: #0f1117; border-top: 1px solid #1e2230; display: flex; gap: 20px; font-size: 12px; color: #6b7280; }
.stat { display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.leaflet-popup-content-wrapper { background: #1a1f2e; color: #f0f0f0; border: 1px solid #2d3748; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.5); }
.leaflet-popup-tip { background: #1a1f2e; }
.leaflet-popup-content { margin: 12px 14px; font-family: inherit; }
.popup-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 4px; }
.popup-cat { font-size: 11px; font-weight: 500; margin-bottom: 5px; }
.popup-addr { font-size: 11px; color: #9ca3af; line-height: 1.4; }
</style>
</head>

const BOOK_CATS = new Set(['Книгарня','Магазин рідкісних книг','Магазин дитячої літератури','Магазин коміксів','Магазин потриманих книжок','Оптовий продаж книг','Магазин журналів']);
const CAFE_CATS = new Set(["Кав'ярня",'Кафе','Еспресо-бар']);
const LIB_CATS  = new Set(['Бібліотека','Громадська бібліотека','Дитяча бібліотека']);

function getType(c) {
  if (BOOK_CATS.has(c)) return 'book';
  if (CAFE_CATS.has(c)) return 'cafe';
  return 'lib';
}

const map = L.map('map', { center: [49.0, 32.0], zoom: 6 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

function makeIcon(color) {
  return L.divIcon({
    className: '',
    html: '<div style="width:10px;height:10px;border-radius:50%;background:' + color + ';border:1.5px solid rgba(255,255,255,.35);box-shadow:0 0 5px ' + color + '90"></div>',
    iconSize: [10,10], iconAnchor: [5,5]
  });
}

let currentLayer = null;

function render(type) {
  if (currentLayer) map.removeLayer(currentLayer);

  const cluster = L.markerClusterGroup({
    maxClusterRadius: 45,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: function(cl) {
      const n = cl.getChildCount();
      const size = n < 10 ? 30 : n < 50 ? 38 : 46;
      return L.divIcon({
        html: '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;background:rgba(37,99,235,.88);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;border:2px solid rgba(255,255,255,.25);box-shadow:0 2px 10px rgba(37,99,235,.6)">' + n + '</div>',
        className: '',
        iconSize: [size, size]
      });
    }
  });

  let books = 0, cafes = 0, libs = 0;
  ALL_DATA.forEach(function(p) {
    const t = getType(p.c);
    if (type !== 'all' && t !== type) return;
    if (t === 'book') books++;
    else if (t === 'cafe') cafes++;
    else libs++;

    const m = L.marker([p.la, p.lo], { icon: makeIcon(p.col) });
    m.bindPopup(
      '<div class="popup-title">' + p.t + '</div>' +
      '<div class="popup-cat" style="color:' + p.col + '">' + p.c + '</div>' +
      (p.a ? '<div class="popup-addr">' + p.a + '</div>' : '')
    );
    cluster.addLayer(m);
  });

  const total = books + cafes + libs;
  document.getElementById('count-label').textContent = total.toLocaleString('uk') + ' точок на карті';
  document.getElementById('s-book').textContent = books.toLocaleString('uk');
  document.getElementById('s-cafe').textContent = cafes.toLocaleString('uk');
  document.getElementById('s-lib').textContent = libs.toLocaleString('uk');

  currentLayer = cluster;
  map.addLayer(cluster);
}

document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) {
      b.className = 'filter-btn';
    });
    const t = btn.dataset.type;
    btn.className = 'filter-btn active-' + t;
    render(t);
  });
});

render('all');
</script>
